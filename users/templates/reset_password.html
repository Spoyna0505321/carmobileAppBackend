<!DOCTYPE html>
<html>
<head>
    <title>Reset Password</title>
</head>
<body>

<h1>Reset Password</h1>

<form method="POST">
    {% csrf_token %}

    <input
        type="password"
        name="password"
        placeholder="New Password"
    >

    <button type="submit">
        Change Password
    </button>

</form>

</body>
</html>
